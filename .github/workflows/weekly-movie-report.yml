name: Weekly Movie Report

permissions:
  contents: read

on:
  schedule:
     # Run every Friday at 8:00 PM UTC (4:00 PM EDT / 3:00 PM EST)
    - cron: '0 20 * * 5'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-movie-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1
        with:
          version: '2.0.1'
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --only main

      - name: Run Platelet-Movie
        id: platelet
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_REGION: ${{ vars.TMDB_REGION || 'US' }}
        run: |
          echo "Running platelet-movie..."
          OUTPUT=$(poetry run platelet-movie --format html 2>&1) || true
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT"

      - name: Generate Lady Whistledown commentary
        id: commentary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Generating Lady Whistledown commentary..."
          chmod +x scripts/lady_whistledown.py
          COMMENTARY=$(echo "${{ steps.platelet.outputs.output }}" | poetry run python scripts/lady_whistledown.py)
          echo "intro<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENTARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "$COMMENTARY"

      - name: Send email report
        uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c # v17
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT || 587 }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎬 Lady Whistledown's Weekly Platelet Movie Report"
          to: ${{ secrets.PLATELET_MOVIE_SUBSCRIBERS }}
          from: ${{ secrets.MAIL_FROM || secrets.MAIL_USERNAME }}
          html_body: |
            <html>
            <body>
            <pre style="font-family: Georgia, serif; white-space: pre-wrap;">
            ${{ steps.commentary.outputs.intro }}
            </pre>
            <hr>
            ${{ steps.platelet.outputs.output }}
            <hr>
            <p style="font-size: 0.9em; color: #666;">
            This report was generated automatically by GitHub Actions.<br>
            Repository: ${{ github.repository }}
            </p>
            </body>
            </html>
