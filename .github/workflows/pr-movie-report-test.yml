name: PR Movie Report Test (End-to-End)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  functional-test-movie-report:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write  # Needed to post comments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.0.1'
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --only main

      - name: Run Platelet-Movie
        id: platelet
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_REGION: ${{ vars.TMDB_REGION || 'US' }}
        run: |
          echo "Running platelet-movie..."
          OUTPUT=$(poetry run platelet-movie 2>&1) || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}
          
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "$OUTPUT"
          
          # Exit with the original exit code
          exit $EXIT_CODE

      - name: Generate Lady Whistledown commentary
        id: commentary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Generating Lady Whistledown commentary..."
          chmod +x scripts/lady_whistledown.py
          COMMENTARY=$(echo "${{ steps.platelet.outputs.output }}" | poetry run python scripts/lady_whistledown.py)
          echo "intro<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENTARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "$COMMENTARY"

      - name: Post report as PR comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const commentary = `${{ steps.commentary.outputs.intro }}`;
            const movieList = `${{ steps.platelet.outputs.output }}`;
            
            const body = `## 🎬 Weekly Movie Report Test (End-to-End Functional Test)
            
            This comment shows what the weekly movie report email would contain if sent right now.
            
            ---
            
            ${commentary}
            
            ═══════════════════════════════════════════════════════════════
            
            ${movieList}
            
            ═══════════════════════════════════════════════════════════════
            
            *This report was generated automatically as part of the PR functional test.*
            *Repository: ${{ github.repository }}*
            *Workflow: ${{ github.workflow }}*
            *PR: #${{ github.event.pull_request.number }}*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Post error comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.platelet.outputs.output }}`;
            
            const body = `## ❌ Weekly Movie Report Test Failed
            
            The end-to-end functional test of the weekly movie report workflow failed.
            
            ### Error Output
            
            \`\`\`
            ${output}
            \`\`\`
            
            Please check the workflow logs for more details and fix the issue before merging.
            
            *Workflow: ${{ github.workflow }}*
            *PR: #${{ github.event.pull_request.number }}*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
