name: Deploy GitHub Pages

on:
  schedule:
    # Run every Friday at 8:00 PM UTC (same as weekly email report)
    - cron: '0 20 * * 5'
  workflow_dispatch: # Allow manual trigger

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.0.1'
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --only main

      - name: Generate movie data
        id: movies
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_REGION: ${{ vars.TMDB_REGION || 'US' }}
        run: |
          echo "Generating movie data..."
          poetry run platelet-movie --format json > movies.json
          cat movies.json

      - name: Generate Lady Whistledown commentary
        id: commentary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Generating commentary..."
          chmod +x scripts/lady_whistledown.py
          # Generate plain text version for the movie list
          MOVIE_TEXT=$(poetry run platelet-movie --format markdown)
          COMMENTARY=$(echo "$MOVIE_TEXT" | poetry run python scripts/lady_whistledown.py)
          
          # Save commentary to file
          echo "$COMMENTARY" > commentary.txt
          cat commentary.txt

      - name: Build data.json
        run: |
          echo "Building data.json..."
          # Create a Python script to merge movies and commentary
          cat > build_data.py << 'EOF'
          import json
          from datetime import datetime, timezone

          # Read movies JSON
          with open('movies.json', 'r') as f:
              movies = json.load(f)

          # Read commentary
          with open('commentary.txt', 'r') as f:
              commentary = f.read().strip()

          # Build final data structure
          data = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "commentary": commentary,
              "movies": movies
          }

          # Write to docs/data.json
          with open('docs/data.json', 'w') as f:
              json.dump(data, f, indent=2)

          print("✓ Generated docs/data.json")
          EOF

          python build_data.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
