version: 2
updates:
  # Python dependencies (both production and development)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      production-dependencies:
        patterns:
          - "click*"
          - "requests*"
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff*"
          - "poethepoet*"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 10
